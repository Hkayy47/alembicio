<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#57606a"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf222e"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="420" fill="#ffffff"/>
  <text x="480" y="30" text-anchor="middle" font-size="17" font-weight="600" fill="#1f2933">alembicio migration state machine</text>

  <!-- main pipeline row -->
  <g font-size="12.5" fill="#1f2933">
    <rect x="22"  y="70" width="108" height="52" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="76"  y="92" text-anchor="middle" font-weight="600">PLAN</text>
    <text x="76"  y="109" text-anchor="middle" font-size="10.5" fill="#57606a">doctor: cost·time·disk</text>

    <rect x="152" y="70" width="108" height="52" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="206" y="92" text-anchor="middle" font-weight="600">PREPARE</text>
    <text x="206" y="109" text-anchor="middle" font-size="10.5" fill="#57606a">column/collection + capture</text>

    <rect x="282" y="70" width="128" height="52" rx="8" fill="#eef2ff" stroke="#6d5ae6"/>
    <text x="346" y="92" text-anchor="middle" font-weight="600">BACKFILL ⟲</text>
    <text x="346" y="109" text-anchor="middle" font-size="10.5" fill="#57606a">checkpointed · budgeted</text>

    <rect x="432" y="70" width="112" height="52" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="488" y="92" text-anchor="middle" font-weight="600">VERIFY</text>
    <text x="488" y="109" text-anchor="middle" font-size="10.5" fill="#57606a">recall@k · MRR gate</text>

    <rect x="566" y="70" width="118" height="52" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="625" y="92" text-anchor="middle" font-weight="600">CUTOVER</text>
    <text x="625" y="109" text-anchor="middle" font-size="10.5" fill="#57606a">canary % → 100%</text>

    <rect x="706" y="70" width="96" height="52" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="754" y="92" text-anchor="middle" font-weight="600">SOAK</text>
    <text x="754" y="109" text-anchor="middle" font-size="10.5" fill="#57606a">both spaces live</text>

    <rect x="824" y="70" width="118" height="52" rx="8" fill="#eafaf0" stroke="#1a7f37"/>
    <text x="883" y="92" text-anchor="middle" font-weight="600">DECOMMISSION</text>
    <text x="883" y="109" text-anchor="middle" font-size="10.5" fill="#57606a">drop old space</text>
  </g>

  <!-- pipeline arrows -->
  <g stroke="#57606a" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <line x1="130" y1="96" x2="150" y2="96"/>
    <line x1="260" y1="96" x2="280" y2="96"/>
    <line x1="410" y1="96" x2="430" y2="96"/>
    <line x1="544" y1="96" x2="564" y2="96"/>
    <line x1="684" y1="96" x2="704" y2="96"/>
    <line x1="802" y1="96" x2="822" y2="96"/>
  </g>

  <!-- crash/resume loop on BACKFILL -->
  <path d="M 316 70 C 306 44, 386 44, 376 70" fill="none" stroke="#6d5ae6" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="346" y="40" text-anchor="middle" font-size="10.5" fill="#6d5ae6">crash → resume from durable state (I1, I2)</text>

  <!-- pause states -->
  <rect x="292" y="150" width="108" height="34" rx="8" fill="#fff8f0" stroke="#bf8700"/>
  <text x="346" y="171" text-anchor="middle" font-size="11" fill="#7d5a00">PAUSED (budget/error)</text>
  <path d="M 336 122 L 336 148" stroke="#bf8700" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>
  <path d="M 356 148 L 356 122" stroke="#bf8700" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>
  <text x="410" y="171" font-size="10.5" fill="#7d5a00">clean stop at batch boundary, resumable (I5)</text>

  <!-- rollback lane -->
  <rect x="432" y="228" width="370" height="36" rx="8" fill="#fff5f5" stroke="#cf222e"/>
  <text x="617" y="250" text-anchor="middle" font-size="11.5" fill="#cf222e" font-weight="600">ROLLBACK — flip read path back to old (instant, lossless)</text>
  <g stroke="#cf222e" stroke-width="1.4" fill="none" stroke-dasharray="5 4" marker-end="url(#arrR)">
    <path d="M 488 122 L 488 226"/>
    <path d="M 625 122 L 625 226"/>
    <path d="M 754 122 L 754 226"/>
  </g>
  <text x="500" y="200" font-size="10.5" fill="#cf222e">gate fails / regression during canary or soak</text>

  <!-- dual-write lane -->
  <rect x="22" y="312" width="920" height="72" rx="10" fill="#f0f7ff" stroke="#0969da"/>
  <text x="40" y="336" font-size="12.5" font-weight="600" fill="#0a3069">Live application writes (never paused)</text>
  <text x="40" y="356" font-size="11" fill="#0a3069">insert / update → dirty-flag trigger (pgvector) or SDK shim (Qdrant) marks row pending in the new space (I4)</text>
  <text x="40" y="373" font-size="11" fill="#0a3069">delete → wins everywhere: structural on dual-column; tombstone + reconciliation sweep on dual-collection (I3)</text>
  <g stroke="#0969da" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <path d="M 346 310 L 346 188"/>
    <path d="M 754 310 L 754 270"/>
  </g>
  <text x="360" y="300" font-size="10.5" fill="#0969da">feeds BACKFILL queue</text>
  <text x="768" y="300" font-size="10.5" fill="#0969da">kept through SOAK → rollback stays lossless</text>
</svg>
