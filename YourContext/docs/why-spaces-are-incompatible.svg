<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf222e"/>
    </marker>
  </defs>
  <rect width="760" height="330" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1f2933">Same texts, two models: coordinates live in unrelated bases</text>

  <!-- Model A panel -->
  <rect x="30" y="50" width="320" height="210" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="190" y="74" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2933">Model A space (indexed corpus)</text>
  <g font-size="11" fill="#1f2933">
    <circle cx="120" cy="120" r="5" fill="#0969da"/><text x="132" y="124">"cat"</text>
    <circle cx="150" cy="145" r="5" fill="#0969da"/><text x="162" y="149">"kitten"</text>
    <circle cx="95"  cy="215" r="5" fill="#0969da"/><text x="107" y="219">"car"</text>
    <circle cx="265" cy="200" r="5" fill="#0969da"/><text x="222" y="188">"loan"</text>
  </g>

  <!-- Model B panel -->
  <rect x="410" y="50" width="320" height="210" rx="10" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="570" y="74" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f2933">Model B space (new query model)</text>
  <g font-size="11" fill="#1f2933">
    <circle cx="640" cy="220" r="5" fill="#6d5ae6"/><text x="652" y="224">"cat"</text>
    <circle cx="612" cy="196" r="5" fill="#6d5ae6"/><text x="560" y="192">"kitten"</text>
    <circle cx="700" cy="110" r="5" fill="#6d5ae6"/><text x="660" y="106">"car"</text>
    <circle cx="470" cy="130" r="5" fill="#6d5ae6"/><text x="482" y="134">"loan"</text>
    <circle cx="596" cy="176" r="6" fill="none" stroke="#cf222e" stroke-width="2"/>
    <text x="606" y="168" font-size="11" fill="#cf222e">query "kitten" → q_B</text>
  </g>

  <!-- cross-space comparison arrow -->
  <path d="M 590 176 C 430 150, 380 210, 272 200" fill="none" stroke="#cf222e" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#a2)"/>
  <text x="380" y="150" text-anchor="middle" font-size="11.5" fill="#cf222e">q_B searched against A's index → nearest neighbor: "loan" (cos ≈ 0.02)</text>

  <text x="380" y="290" text-anchor="middle" font-size="12" fill="#1f2933">Training fixes only relative geometry: any orthogonal Q gives ⟨Qx,Qy⟩ = ⟨x,y⟩, so coordinates are arbitrary up to rotation —</text>
  <text x="380" y="308" text-anchor="middle" font-size="12" fill="#1f2933">and different data/init/architecture change the geometry itself. Cross-space cosine ≈ noise near 0 ⇒ 0.000 recall.</text>
</svg>
