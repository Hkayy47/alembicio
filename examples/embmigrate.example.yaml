# embmigrate.yaml — keyless local demo config (fastembed); an OpenAI variant is at the
# bottom. Secrets only via env: indirection (INVARIANTS I11).
migration: demo-minilm-to-bge
source:
  provider: fastembed
  model: sentence-transformers/all-MiniLM-L6-v2
  dim: 384
target:
  provider: fastembed
  model: BAAI/bge-small-en-v1.5
  dim: 384
store:
  kind: pgvector
  dsn: env:DATABASE_URL
  table: documents
  id_column: id
  text_column: content
backfill:
  batch_size: 256
  budget: { max_usd: 0, max_tokens: 200_000_000 }   # local models spend no USD
  rate_limit: { tpm: 0, rpm: 0 }                    # 0 = unthrottled (local)
  on_poison: dead_letter
verify:
  golden_queries: examples/golden.example.jsonl
  gates: { min_recall_ratio: 1.0, k: 10, report: report.md }
cutover:
  mode: staged
  canary_pct: 5
  soak_hours: 72
mapping:
  kind: none            # procrustes | ridge | none
  anchors: 4096
  min_recovery: 0.95

