services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: alembicio
      POSTGRES_PASSWORD: alembicio
      POSTGRES_DB: alembicio
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alembicio -d alembicio"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10
